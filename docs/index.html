<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Documentation</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
  :root {
    --sidebar-width: 300px;
    --sidebar-bg: #0d1117;
    --sidebar-fg: #c9d1d9;
    --sidebar-hover: #161b22;
    --sidebar-active: #1f6feb;
    --content-bg: #ffffff;
    --content-fg: #24292f;
    --border: #d0d7de;
    --code-bg: #f6f8fa;
    --link: #0969da;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--content-fg);
    background: var(--content-bg);
  }
  .layout { display: flex; min-height: 100vh; }

  /* ── Sidebar ──────────────────────────────────────────────── */
  nav.sidebar {
    width: var(--sidebar-width);
    background: var(--sidebar-bg);
    color: var(--sidebar-fg);
    padding: 20px 14px 28px;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    border-right: 1px solid #30363d;
  }
  .sidebar-brand {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #8b949e;
    margin: 0 6px 14px;
  }
  .sidebar-home a {
    display: block;
    padding: 8px 10px;
    color: var(--sidebar-fg);
    text-decoration: none;
    border-radius: 6px;
    font-size: 13.5px;
    margin-bottom: 18px;
    transition: background 0.12s, color 0.12s;
  }
  .sidebar-home a:hover  { background: var(--sidebar-hover); color: #fff; }
  .sidebar-home a.active { background: var(--sidebar-active); color: #fff; font-weight: 500; }

  .project-section { margin-bottom: 22px; }
  .project-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #6e7681;
    font-weight: 600;
    padding: 0 10px;
    margin: 0 0 5px;
  }
  .project-section ul { list-style: none; padding: 0; margin: 0; }
  .project-section li { margin: 1px 0; }
  .project-section a {
    display: flex;
    align-items: baseline;
    gap: 7px;
    padding: 7px 10px;
    color: var(--sidebar-fg);
    text-decoration: none;
    border-radius: 6px;
    font-size: 13px;
    line-height: 1.4;
    transition: background 0.12s, color 0.12s;
  }
  .project-section a:hover  { background: var(--sidebar-hover); color: #fff; }
  .project-section a.active { background: var(--sidebar-active); color: #fff; font-weight: 500; }
  .doc-num {
    flex-shrink: 0;
    width: 20px;
    font-size: 11px;
    color: #6e7681;
    font-variant-numeric: tabular-nums;
  }
  .project-section a.active .doc-num { color: #c6e2ff; }

  .sidebar-footer {
    font-size: 11px;
    color: #6e7681;
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid #30363d;
    line-height: 1.5;
    padding-left: 6px;
  }

  /* ── Main content ─────────────────────────────────────────── */
  main {
    margin-left: var(--sidebar-width);
    flex: 1;
    padding: 48px 64px 80px;
    max-width: 960px;
  }
  main h1, main h2, main h3, main h4 {
    margin-top: 1.6em;
    margin-bottom: 0.6em;
    line-height: 1.25;
  }
  main h1 { font-size: 2em;   border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  main h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
  main h3 { font-size: 1.25em; }
  main p, main li { line-height: 1.65; }
  main a { color: var(--link); text-decoration: none; }
  main a:hover { text-decoration: underline; }
  main code {
    background: var(--code-bg);
    padding: 0.2em 0.4em;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  }
  main pre {
    background: var(--code-bg);
    border: 1px solid var(--border);
    padding: 14px 16px;
    border-radius: 8px;
    overflow-x: auto;
    line-height: 1.5;
  }
  main pre code { background: none; padding: 0; font-size: 0.88em; }
  main table {
    border-collapse: collapse;
    width: 100%;
    margin: 1em 0;
    font-size: 0.93em;
  }
  main th, main td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
  main th { background: var(--code-bg); font-weight: 600; }
  main tr:nth-child(even) td { background: #fafbfc; }
  main blockquote {
    border-left: 4px solid #d0d7de;
    color: #57606a;
    padding: 0 1em;
    margin: 1em 0;
  }
  main hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

  /* ── Home page project cards ──────────────────────────────── */
  .project-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin: 24px 0;
  }
  .project-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .project-card:hover { border-color: var(--link); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .project-card h3 { margin: 0 0 8px; font-size: 1em; border: none; padding: 0; }
  .project-card h3 a { color: var(--content-fg); font-weight: 600; }
  .project-card p { margin: 0 0 12px; font-size: 0.88em; color: #57606a; }
  .project-card ul { margin: 0; padding-left: 16px; font-size: 0.87em; }
  .project-card ul li { margin: 3px 0; }

  /* ── Responsive ───────────────────────────────────────────── */
  @media (max-width: 860px) {
    :root { --sidebar-width: 240px; }
    main { padding: 28px 24px 60px; }
  }
  @media (max-width: 640px) {
    nav.sidebar { position: static; width: 100%; height: auto; }
    main { margin-left: 0; padding: 24px 18px; }
    .layout { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar" aria-label="Documentation navigation">
    <p class="sidebar-brand">Documentation</p>
    <div class="sidebar-home">
      <a href="#home" data-route="home">&#8962;&nbsp; Home</a>
      <a href="#repositories/06" data-route="repositories/06">&#128203;&nbsp; Changelog</a>
    </div>
    <div id="project-nav"></div>
    <div class="sidebar-footer">Engineering Documentation Portal</div>
  </nav>
  <main id="content">
    <p style="color:#6e7681;font-style:italic">Loading…</p>
  </main>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// SERVING-CONTEXT DETECTION
//
// basePaths are computed at runtime from window.location so the portal works
// regardless of which directory the HTTP server is started from.
//
// Mode A — serve from incident-response/ root  (recommended: gives access to
//           all repository READMEs)
//
//   cd incident-response/
//   python3 -m http.server 8000
//   open http://localhost:8000/project-docs/docs/
//
// Mode B — serve from project-docs/docs/  (framework docs only; repository
//           READMEs are not reachable because the HTTP server cannot serve
//           files above its own root directory)
//
//   cd project-docs/docs/
//   python3 -m http.server 8000
//   open http://localhost:8000/
//
// Detection: if the page URL contains "/project-docs/docs" in its path,
// we are in Mode A and must prefix framework doc fetches with that path.
// ════════════════════════════════════════════════════════════════════════════
const _atProjectRoot = window.location.pathname.includes('/project-docs/docs');
const _docsBase      = _atProjectRoot ? 'project-docs/docs/' : '';
const _repoBase      = _atProjectRoot ? '' : '../../';
// Note: in Mode B _repoBase resolves to paths above the server root.
// Python's http.server blocks those, so repository links will 404 with a
// message explaining how to switch to Mode A.

// ════════════════════════════════════════════════════════════════════════════
// PROJECT REGISTRY
//
// To add a new project, append an entry to this array.
// Use _docsBase / _repoBase for files near this portal, or a literal string
// for projects served from their own subdirectory.
//
// URL scheme:  #<projectId>/<docNum>           — load a doc
//              #<projectId>/<docNum>:<anchor>  — load a doc and scroll to heading
// ════════════════════════════════════════════════════════════════════════════
const PROJECTS = [
  {
    id:          "incident-response",
    name:        "Incident Response Framework",
    description: "AI-powered multi-agent system for automated infrastructure incident response — built on graphserv, Neo4j, LangGraph, Ollama, Qdrant, and MySQL.",
    basePath:    _docsBase,
    docs: [
      { num: "01", file: "01-incident-response-framework.md", title: "Framework & Plan" },
      { num: "02", file: "02-database-setup.md",               title: "Database Setup & Schemas" },
      { num: "03", file: "03-graphserv-rest-service.md",        title: "graphserv REST Service" },
      { num: "04", file: "04-mcp-servers.md",                   title: "Building MCP Servers" },
      { num: "05", file: "05-langgraph-agents.md",              title: "LangGraph Agents" },
    ]
  },
  {
    id:          "repositories",
    name:        "Repositories",
    description: "Source README files for each component repository. Requires serving from the incident-response/ project root.",
    basePath:    _repoBase,
    docs: [
      { num: "01", file: "autoincrespagent/README.md",  title: "autoincrespagent" },
      { num: "02", file: "graphserv/README.md",          title: "graphserv" },
      { num: "03", file: "graphmcpserv/README.md",       title: "graphmcpserv" },
      { num: "04", file: "mitigationmcpserv/README.md",  title: "mitigationmcpserv" },
      { num: "05", file: "commsmcpserv/README.md",       title: "commsmcpserv" },
      { num: "06", file: "CHANGELOG.md",                 title: "Changelog" },
    ]
  }
];

// ════════════════════════════════════════════════════════════════════════════
// FILE → ROUTE MAP
//
// Built from PROJECTS so any .md link in any doc can be resolved to a route
// regardless of which project or directory it lives in.
// Key: full path relative to the server root (basePath + file).
// Value: "projectId/docNum"
// ════════════════════════════════════════════════════════════════════════════
const FILE_ROUTE_MAP = {};
PROJECTS.forEach(proj => {
  proj.docs.forEach(doc => {
    FILE_ROUTE_MAP[proj.basePath + doc.file] = `${proj.id}/${doc.num}`;
  });
});

// ════════════════════════════════════════════════════════════════════════════
// RESOLVE PATH
//
// Resolves a relative link found in a markdown file against the directory
// of that file, returning a normalised path from the server root.
// E.g. resolvePath("autoincrespagent/", "../graphserv/README.md")
//      → "graphserv/README.md"
// ════════════════════════════════════════════════════════════════════════════
function resolvePath(baseDir, rel) {
  const parts = (baseDir + rel).split('/');
  const out = [];
  for (const p of parts) {
    if (p === '..') out.pop();
    else if (p !== '.') out.push(p);
  }
  return out.join('/');
}

// ════════════════════════════════════════════════════════════════════════════
// SLUGIFY
//
// Mirrors marked's internal Slugger algorithm so that the IDs we attach to
// rendered headings match the anchor fragments used in markdown ToC links.
//
// E.g. "3. Supervisor / Orchestrator" → "3-supervisor--orchestrator"
//      (the slash between two spaces produces two consecutive hyphens)
// ════════════════════════════════════════════════════════════════════════════
function slugify(text) {
  return text
    .toLowerCase()
    .trim()
    .replace(/[\u2000-\u206F\u2E00-\u2E7F\\'!"#$%&()*+,./:;<=>?@[\]^`{|}~]/g, '')
    .replace(/\s/g, '-');      // each whitespace char → one hyphen (preserves runs)
}

// ════════════════════════════════════════════════════════════════════════════
// MARKED CONFIGURATION
//
// A custom heading renderer that always emits id="…" attributes.
// Required because marked v7+ removed heading IDs by default.
// The slugify function above produces the same slugs that the ToC links
// already reference inside the markdown files.
// ════════════════════════════════════════════════════════════════════════════
marked.use({
  gfm: true,
  breaks: false,
  renderer: {
    heading(tokenOrText, levelArg, rawArg) {
      // marked v5+  → called with a token object {text, depth, raw, ...}
      // marked v4   → called with (text, level, raw)
      let text, depth, rawText;
      if (tokenOrText !== null && typeof tokenOrText === 'object') {
        text    = tokenOrText.text;
        depth   = tokenOrText.depth;
        rawText = tokenOrText.raw || tokenOrText.text;
      } else {
        text    = tokenOrText;
        depth   = levelArg;
        rawText = rawArg || tokenOrText;
      }
      // Strip the leading "## " markdown syntax that can appear in raw
      const plain = rawText.replace(/^#{1,6}\s*/, '').replace(/\s*#*\s*$/, '').trim();
      // Strip any inline HTML tags so the slug is derived from plain text
      const slug  = slugify(plain.replace(/<[^>]+>/g, ''));
      return `<h${depth} id="${slug}">${text}</h${depth}>\n`;
    }
  }
});

// ════════════════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════════════════
const contentEl    = document.getElementById('content');
const projectNavEl = document.getElementById('project-nav');

// ════════════════════════════════════════════════════════════════════════════
// BUILD SIDEBAR
// ════════════════════════════════════════════════════════════════════════════
function buildNav() {
  projectNavEl.innerHTML = '';
  PROJECTS.forEach(proj => {
    const section = document.createElement('div');
    section.className = 'project-section';
    section.dataset.projectId = proj.id;

    const label = document.createElement('p');
    label.className = 'project-label';
    label.textContent = proj.name;
    section.appendChild(label);

    const ul = document.createElement('ul');
    proj.docs.forEach(doc => {
      const li = document.createElement('li');
      const a  = document.createElement('a');
      const route = `${proj.id}/${doc.num}`;
      a.href = '#' + route;
      a.dataset.route = route;
      a.innerHTML = `<span class="doc-num">${doc.num}</span>${doc.title}`;
      a.addEventListener('click', e => { e.preventDefault(); navigate(route); });
      li.appendChild(a);
      ul.appendChild(li);
    });
    section.appendChild(ul);
    projectNavEl.appendChild(section);
  });

  // Wire all top-level sidebar links (Home, Changelog, any future additions)
  document.querySelectorAll('.sidebar-home a[data-route]').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      navigate(a.dataset.route);
    });
  });
}

function setActive(route) {
  document.querySelectorAll('.sidebar-home a, .project-section a').forEach(a => {
    a.classList.toggle('active', a.dataset.route === route);
  });
}

// ════════════════════════════════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════════════════════════════════
function navigate(route, anchor, pushState = true) {
  if (pushState) {
    const hash = '#' + route + (anchor ? ':' + anchor : '');
    history.pushState({ route, anchor: anchor || null }, '', hash);
  }
  if (route === 'home') {
    showHome();
    return;
  }
  const slashIdx = route.indexOf('/');
  const projId   = slashIdx >= 0 ? route.slice(0, slashIdx) : route;
  const docNum   = slashIdx >= 0 ? route.slice(slashIdx + 1) : null;

  const proj = PROJECTS.find(p => p.id === projId);
  if (!proj) { showHome(); return; }

  if (!docNum) {
    // Link to just the project — go to its first doc
    navigate(`${proj.id}/${proj.docs[0].num}`, anchor, false);
    return;
  }
  const doc = proj.docs.find(d => d.num === docNum);
  if (!doc) { showHome(); return; }

  loadDoc(proj, doc, anchor);
}

function routeFromHash() {
  const raw = window.location.hash.replace(/^#/, '');
  if (!raw || raw === 'home') { navigate('home', null, false); return; }

  // Format: <route>  or  <route>:<anchor>
  const colonIdx = raw.indexOf(':');
  const route  = colonIdx >= 0 ? raw.slice(0, colonIdx) : raw;
  const anchor = colonIdx >= 0 ? raw.slice(colonIdx + 1) : null;
  navigate(route, anchor, false);
}

// ════════════════════════════════════════════════════════════════════════════
// HOME PAGE  — auto-generated from the PROJECTS registry
// ════════════════════════════════════════════════════════════════════════════
function showHome() {
  setActive('home');

  const cards = PROJECTS.map(proj => {
    const firstRoute = `${proj.id}/${proj.docs[0].num}`;
    const docList = proj.docs.map(d =>
      `<li><a href="#${proj.id}/${d.num}" data-route="${proj.id}/${d.num}">${d.num}. ${d.title}</a></li>`
    ).join('');
    return `
      <div class="project-card">
        <h3><a href="#${firstRoute}" data-route="${firstRoute}">${proj.name}</a></h3>
        <p>${proj.description}</p>
        <ul>${docList}</ul>
      </div>`;
  }).join('');

  contentEl.innerHTML = `
    <h1>Engineering Documentation</h1>
    <p>Select a project from the sidebar or jump straight to a document below.</p>
    <div class="project-cards">${cards}</div>`;

  contentEl.querySelectorAll('a[data-route]').forEach(a => {
    a.addEventListener('click', e => { e.preventDefault(); navigate(a.dataset.route); });
  });

  window.scrollTo(0, 0);
}

// ════════════════════════════════════════════════════════════════════════════
// LOAD & RENDER A DOCUMENT
// ════════════════════════════════════════════════════════════════════════════
async function loadDoc(proj, doc, anchor) {
  const route = `${proj.id}/${doc.num}`;
  setActive(route);
  contentEl.innerHTML = '<p style="color:#6e7681;font-style:italic">Loading…</p>';

  try {
    const path = proj.basePath + doc.file;
    const resp = await fetch(path, { cache: 'no-cache' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const md   = await resp.text();
    const html = DOMPurify.sanitize(marked.parse(md));
    contentEl.innerHTML = html;
    contentEl.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));

    // Ensure every heading has an id (fallback if the renderer didn't emit one).
    // This runs after innerHTML is set so h.textContent is the visible text.
    ensureHeadingIds();

    // Intercept links inside the rendered document.
    rewriteLinks(proj, doc);

    if (anchor) {
      setTimeout(() => scrollToAnchor(anchor), 80);
    } else {
      window.scrollTo(0, 0);
    }
  } catch (err) {
    contentEl.innerHTML =
      '<h1>Unable to load document</h1>' +
      '<p>Could not fetch <code>' + doc.file + '</code>: ' + err.message + '</p>' +
      '<p>Could not load this file. Two common causes:</p>' +
      '<ol>' +
      '<li><strong>Opened directly from disk</strong> — browsers block <code>fetch()</code> for local files. ' +
      'Use a local HTTP server instead.</li>' +
      '<li><strong>Server started inside <code>project-docs/docs/</code></strong> — repository README files ' +
      'live outside that directory and cannot be served from there.</li>' +
      '</ol>' +
      '<p>Start the server from the <strong>incident-response/ project root</strong> to fix both issues:</p>' +
      '<pre><code>cd incident-response/\npython3 -m http.server 8000</code></pre>' +
      '<p>Then open <a href="http://localhost:8000/project-docs/docs/">http://localhost:8000/project-docs/docs/</a></p>' +
      '<p>Framework docs work from either location. Repository READMEs require the project root.</p>';
  }
}

// ════════════════════════════════════════════════════════════════════════════
// ENSURE HEADING IDs
//
// Post-processing fallback: if any heading is missing an id (can happen with
// certain marked versions), derive one from the heading's visible text using
// the same slugify function, so it matches the ToC anchor links.
// ════════════════════════════════════════════════════════════════════════════
function ensureHeadingIds() {
  const seen = {};
  contentEl.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(h => {
    if (!h.id) {
      let slug = slugify(h.textContent);
      // Deduplicate (marked's Slugger also de-dupes with a counter suffix)
      if (seen[slug]) {
        slug = slug + '-' + seen[slug];
        seen[slug] = (seen[slug] || 0) + 1;
      } else {
        seen[slug] = 1;
      }
      h.id = slug;
    }
  });
}

// ════════════════════════════════════════════════════════════════════════════
// SCROLL TO ANCHOR
// ════════════════════════════════════════════════════════════════════════════
function scrollToAnchor(anchor) {
  if (!anchor) return;
  const target = document.getElementById(anchor);
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ════════════════════════════════════════════════════════════════════════════
// REWRITE LINKS in rendered markdown
//
// Four cases:
//   1. Pure anchor  (#section-name)    → scroll only, never re-route
//   2. Any relative .md link           → resolve against current file's dir,
//      look up in FILE_ROUTE_MAP, navigate() if found
//   3. External link (http/https)      → open in new tab
//   4. Anything else                   → leave as-is
//
// currentDir: directory of the file being rendered, relative to server root
//   e.g. "project-docs/docs/" for the framework docs
//        "autoincrespagent/"   for that repo's README
// ════════════════════════════════════════════════════════════════════════════
function rewriteLinks(proj, doc) {
  // Directory of the current file relative to the server root
  const fullPath   = proj.basePath + doc.file;
  const currentDir = fullPath.replace(/[^/]*$/, '');  // strip filename

  contentEl.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (!href) return;

    // Case 1: in-page anchor link (Table of Contents entries like #1-why-mcp)
    if (href.startsWith('#')) {
      a.addEventListener('click', e => {
        e.preventDefault();
        scrollToAnchor(href.slice(1));
      });
      return;
    }

    // Case 3: external link — open in new tab, nothing else to do
    if (/^https?:\/\//.test(href)) {
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      return;
    }

    // Case 2: relative markdown link — could be same-dir, subdir, or cross-repo
    // Strip leading "./" if present, then split off any #anchor fragment
    const raw     = href.replace(/^\.\//, '');
    const hashIdx = raw.indexOf('#');
    const relFile = hashIdx >= 0 ? raw.slice(0, hashIdx) : raw;
    const anchor  = hashIdx >= 0 ? raw.slice(hashIdx + 1) : null;

    // Only handle .md files; leave image/code/other relative links alone
    if (!relFile.endsWith('.md')) return;

    const resolved = resolvePath(currentDir, relFile);   // path from server root
    const route    = FILE_ROUTE_MAP[resolved];
    if (route) {
      a.addEventListener('click', e => {
        e.preventDefault();
        navigate(route, anchor);
      });
    }
    // If not in the map (e.g. CHANGELOG.md), leave the link as-is
  });
}

// ════════════════════════════════════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════════════════════════════════════
buildNav();
window.addEventListener('popstate', () => routeFromHash());
routeFromHash();
</script>
</body>
